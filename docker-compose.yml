version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: ohmyfinance-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: ohmyfinance
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    command: mongod --wiredTigerCacheSizeGB 1
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ohmyfinance-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://root:rootpassword@mongo:27017/ohmyfinance?authSource=admin
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
